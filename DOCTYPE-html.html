<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tank Gauge Rate Monitor</title>
    <!-- External Libraries for OCR (Image to Text) and Excel Generation -->
    <script src="https://cloudflare.com"></script>
    <script src="https://cloudflare.com"></script>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 20px;
            background-color: #f4f7f6;
            color: #333;
        }
        .container {
            max-width: 900px;
            margin: 0 auto;
            background: white;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }
        h1 {
            color: #2c3e50;
            text-align: center;
            margin-bottom: 30px;
        }
        .upload-section {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 25px;
        }
        .upload-box {
            border: 2px dashed #bdc3c7;
            padding: 20px;
            text-align: center;
            border-radius: 6px;
            background: #fafafa;
        }
        .upload-box:hover {
            border-color: #3498db;
        }
        label {
            display: block;
            font-weight: bold;
            margin-bottom: 10px;
            color: #34495e;
        }
        input[type="file"] {
            display: block;
            margin: 10px auto;
        }
        button {
            display: block;
            width: 100%;
            padding: 12px;
            background-color: #2ecc71;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s;
        }
        button:hover {
            background-color: #27ae60;
        }
        #status {
            margin-top: 15px;
            text-align: center;
            font-weight: bold;
            color: #e67e22;
        }
        #resultTable {
            width: 100%;
            border-collapse: collapse;
            margin-top: 25px;
            display: none;
        }
        #resultTable th, #resultTable td {
            border: 1px solid #ddd;
            padding: 12px;
            text-align: center;
        }
        #resultTable th {
            background-color: #34495e;
            color: white;
        }
        .btn-excel {
            background-color: #3498db;
            margin-top: 15px;
            display: none;
        }
        .btn-excel:hover {
            background-color: #2980b9;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Tank Gauge Rate Monitor</h1>
    
    <div class="upload-section">
        <div class="upload-box">
            <label>1st Interval Photo</label>
            <input type="file" id="photo1" accept="image/*">
            <div id="time1-preview" style="font-size:12px; color:gray;"></div>
        </div>
        <div class="upload-box">
            <label>2nd Interval Photo</label>
            <input type="file" id="photo2" accept="image/*">
            <div id="time2-preview" style="font-size:12px; color:gray;"></div>
        </div>
    </div>

    <button onclick="processTankImages()">Calculate Gauge Rates</button>
    <div id="status"></div>

    <button id="downloadBtn" class="btn-excel" onclick="exportToExcel()">Download Excel Report (Rates > 1 cm/hr)</button>

    <table id="resultTable">
        <thead>
            <tr>
                <th>Tank ID</th>
                <th>Initial Gauge (cm)</th>
                <th>Final Gauge (cm)</th>
                <th>Net Change (cm)</th>
                <th>Rate (cm/Hour)</th>
            </tr>
        </thead>
        <tbody id="tableBody"></tbody>
    </table>
</div>

<script>
    let calculatedData = [];

    // Helper function to extract text from a specific region of an image
    async function scanImageZone(imageFile, rectangle = null) {
        const options = rectangle ? { rectangle } : {};
        const result = await Tesseract.recognize(imageFile, 'eng', options);
        return result.data.text;
    }

    // Main system workflow
    async function processTankImages() {
        const fileInput1 = document.getElementById('photo1');
        const fileInput2 = document.getElementById('photo2');
        const statusDiv = document.getElementById('status');
        
        if (!fileInput1.files[0] || !fileInput2.files[0]) {
            statusDiv.innerText = "Error: Please upload both interval photos.";
            return;
        }

        const file1 = fileInput1.files[0];
        const file2 = fileInput2.files[0];

        statusDiv.innerText = "Analyzing images and scanning metadata via AI OCR...";

        try {
            // 1. Extract timestamps from the top-left corner (bounding box coordinates)
            const timeBox = { left: 0, top: 0, width: 300, height: 80 }; 
            const rawTextTime1 = await scanImageZone(file1, timeBox);
            const rawTextTime2 = await scanImageZone(file2, timeBox);

            const time1 = parseTime(rawTextTime1);
            const time2 = parseTime(rawTextTime2);

            // Display extracted times or warning to user UI layout
            document.getElementById('time1-preview').innerText = time1 ? `Detected Time: ${time1.toLocaleTimeString()}` : "Time missing (using default)";
            document.getElementById('time2-preview').innerText = time2 ? `Detected Time: ${time2.toLocaleTimeString()}` : "Time missing (using default)";

            // Calculate precise elapsed hours between photo snapshots
            // Fallback default: If OCR misses timestamps, it assumes exactly 1 hour apart
            let hoursGap = 1.0;
            if (time1 && time2) {
                hoursGap = Math.abs(time2 - time1) / (1000 * 60 * 60);
            }

            // Condition matching: Skip calculations if time gap is less than 1 hour
            if (hoursGap < 1) {
                statusDiv.innerText = `Execution stopped: Interval between photos must be 1 hour or more. (Detected interval: ${hoursGap.toFixed(2)} hours)`;
                return;
            }

            // 2. Scan whole images to extract Tank labels and numeric Gauges
            const textContent1 = await scanImageZone(file1);
            const textContent2 = await scanImageZone(file2);

            const tanksMap1 = extractTanksData(textContent1);
            const tanksMap2 = extractTanksData(textContent2);

            // 3. Evaluate variances and calculate rates per hour
            calculatedData = [];
            const tableBody = document.getElementById('tableBody');
            tableBody.innerHTML = "";

            for (const tankId in tanksMap1) {
                if (tanksMap2[tankId] !== undefined) {
                    const gauge1 = tanksMap1[tankId];
                    const gauge2 = tanksMap2[tankId];
                    const netChange = Math.abs(gauge2 - gauge1);
                    const ratePerHour = hoursGap > 0 ? (netChange / hoursGap) : 0;

                    calculatedData.push({
                        tank: tankId,
                        initial: gauge1,
                        final: gauge2,
                        change: netChange.toFixed(2),
                        rate: ratePerHour.toFixed(2)
                    });
                }
            }

            // Filter out output array data specifically matching criteria (> 1 cm/hr)
            const filteredData = calculatedData.filter(d => parseFloat(d.rate) > 1.0);

            if(filteredData.length === 0) {
                statusDiv.innerText = "Processing complete. No tanks exceeded the threshold rate of 1 cm/hour change.";
                document.getElementById('resultTable').style.display = "none";
                document.getElementById('downloadBtn').style.display = "none";
                return;
            }

            // Render live filtered UI view table
            filteredData.forEach(row => {
                const tr = `<tr>
                    <td>${row.tank}</td>
                    <td>${row.initial} cm</td>
                    <td>${row.final} cm</td>
                    <td>${row.change} cm</td>
                    <td>${row.rate} cm/hr</td>
                </tr>`;
                tableBody.innerHTML += tr;
            });

            statusDiv.innerText = "Calculations complete! Anomalies compiled successfully.";
            document.getElementById('resultTable').style.display = "table"; 
            document.getElementById('downloadBtn').style.display = "block";

        } catch (error) {
            console.error(error);
            statusDiv.innerText = "System error parsing data arrays. Ensure images have high-contrast text layout.";
        }
    }

    // RegEx pattern matching timestamp strings (HH:MM or HH:MM:SS)
    function parseTime(text) {
        const timeRegex = /(\d{2}):(\d{2})(?::(\d{2}))?/;
        const match = text.match(timeRegex);
        if (match) {
            const now = new Date();
            const hours = parseInt(match[1], 10);
            const minutes = parseInt(match[2], 10);
            const seconds = match[3] ? parseInt(match[3], 10) : 0;
            return new Date(now.getFullYear(), now.getMonth(), now.getDate(), hours, minutes, seconds);
        }
        return null;
    }

    // RegEx string search pattern matching structured text phrases like "Tank 1: 45" or "TK-A 120"
    function extractTanksData(text) {
        const lines = text.split('\n');
        const tankData = {};
        const pattern = /(?:Tank|TK)\s*([A-Za-z0-9_-]+)[\s:]+(\d+(?:\.\d+)?)/i;

        lines.forEach(line => {
            const match = line.match(pattern);
            if (match) {
                const id = "Tank " + match[1]; 
                const value = parseFloat(match[2]);
                tankData[id] = value;
            }
        });
        return tankData;
    }

    // Excel export utility engine via SheetJS framework instantiation
    function exportToExcel() {
        const filteredData = calculatedData.filter(d => parseFloat(d.rate) > 1.0);
        
        const worksheetData = [
            ["Tank Identification Profile", "Initial Level (cm)", "Final Level (cm)", "Net Shift (cm)", "Calculated Drift Rate (cm/Hour)"]
        ];

        filteredData.forEach(item => {
            worksheetData.push([item.tank, parseFloat(item.initial), parseFloat(item.final), parseFloat(item.change), parseFloat(item.rate)]);
        });

        const wb = XLSX.utils.book_new();
        const ws = XLSX.utils.aoa_to_sheet(worksheetData);
        XLSX.utils.book_append_sheet(wb, ws, "Tank Anomalies Report");
        
        XLSX.writeFile(wb, "Tank_Gauge_Variance_Report.xlsx");
    }
</script>

</body>
</html>
